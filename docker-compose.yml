services:
  app:
    build: .
    command: >
      sh -c "
        php docker/wait-for-db.php &&
        php artisan migrate --force &&
        PHP_CLI_SERVER_WORKERS=4 php artisan serve --host=0.0.0.0 --port=8085
      "
    ports:
      - "${APP_PORT:-8085}:8085"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PHP_CLI_SERVER_WORKERS: 4
    env_file: .env
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - ../polymarket-copy-bot/bot_state.db:/tmp/bot_state.db:ro

  scheduler:
    build: .
    command: >
      sh -c "
        php docker/wait-for-db.php &&
        php artisan schedule:work
      "
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules

  db:
    image: mariadb:11.3
    environment:
      MYSQL_DATABASE: polymarket_bot
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "${DB_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dbdata:
